<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquarium Breeding Hub Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.8/dist/dexie.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { font-family: -apple-system, system-ui, sans-serif; margin: 15px; background: #eef2f3; color: #333; padding-bottom: 60px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border-top: 4px solid #00a8cc; }
        
        /* Navigation */
        .nav { display: flex; gap: 5px; position: sticky; top: 0; background: #eef2f3; z-index: 100; padding: 5px 0; }
        .nav button { flex: 1; font-size: 10px; padding: 12px 2px; background: #fff; border: 1px solid #dee2e6; border-radius: 8px; cursor: pointer; color: #444; font-weight: bold; }
        .nav button.active-tab { background: #00a8cc; color: #fff; border-color: #00a8cc; }
        
        .summary-banner { background: #00a8cc; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .summary-banner h2 { margin: 0; font-size: 24px; }

        input, select { padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 10px; font-size: 15px; background: #f8f9fa; }
        button { padding: 12px; border: none; border-radius: 10px; background: #00a8cc; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        button.secondary { background: #6c757d; }
        button.danger { background: #ff4d4d; width: auto; padding: 6px 10px; font-size: 12px; }
        button.edit-btn { background: #ffc107; color: #212529; width: auto; padding: 6px 10px; font-size: 12px; }
        button.save-btn { background: #28a745; color: white; width: auto; padding: 6px 10px; font-size: 12px; }

        .breed-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .age-badge { padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; color: white; display: inline-block; }
        .bg-fry { background: #3498db; }
        .bg-juv { background: #f39c12; }
        .bg-adult { background: #27ae60; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th, td { text-align: left; padding: 10px 5px; border-bottom: 1px solid #eee; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="nav">
        <button id="btn-scan" class="active-tab" onclick="showTab('scan')">TANK ACCESS</button>
        <button id="btn-data" onclick="showTab('data')">INVENTORY</button>
        <button id="btn-breeds" onclick="showTab('breeds')">SPECIES</button>
        <button id="btn-pdf" onclick="showTab('pdf')">PRINT LABELS</button>
    </div>

    <div id="tab-scan" class="tab-content">
        <div class="card">
            <h3>Open Tank</h3>
            <input type="number" id="manual-tank-id" placeholder="Tank Number">
            <button onclick="handleManualEntry()">Load Record</button>
        </div>
        <div id="capture-form" class="card hidden">
            <h3 id="form-title">Tank: #</h3>
            <label>Species</label>
            <select id="breed-dropdown"></select>
            <label>Hatch Date</label>
            <input type="date" id="born-date-input">
            <label>Fish Count</label>
            <input type="number" id="unit-input">
            <button onclick="saveScan()" style="background:#28a745;">Save Changes</button>
            <button class="secondary" onclick="resetUI()" style="margin-top:10px;">Cancel</button>
        </div>
    </div>

    <div id="tab-data" class="tab-content hidden">
        <div class="summary-banner">
            <p id="category-label">Total Fish</p>
            <h2 id="total-fish-count">0</h2>
        </div>
        <div class="card">
            <select id="age-filter" onchange="loadData()">
                <option value="all">All Stages</option>
                <option value="fry">Fry (0-30d)</option>
                <option value="juv">Juvenile (30-60d)</option>
                <option value="adult">Adult (60-90d)</option>
            </select>
            <div style="overflow-x:auto;">
                <table id="inventory-table">
                    <thead><tr><th>Tank</th><th>Species/Count</th><th>Age</th><th>Action</th></tr></thead>
                    <tbody id="data-body"></tbody>
                </table>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:15px;">
                <button onclick="exportData()" style="background: #6f42c1;">📤 Export</button>
                <button onclick="document.getElementById('importInput').click()" style="background: #e67e22;">📥 Import</button>
                <input type="file" id="importInput" class="hidden" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </div>

    <div id="tab-breeds" class="tab-content hidden">
        <div class="card">
            <h3>Add/Edit Species</h3>
            <input type="text" id="new-breed-name" placeholder="Species Name">
            <input type="number" id="new-breed-price" placeholder="Price ($)">
            <button id="add-breed-btn" onclick="addBreed()">Add Species</button>
        </div>
        <div class="card">
            <input type="text" id="breed-search" placeholder="Search..." onkeyup="renderSpeciesList()">
            <div id="breed-list-container"></div>
        </div>
    </div>

    <div id="tab-pdf" class="tab-content hidden">
        <div class="card">
            <h3>Print Number Labels</h3>
            <p style="font-size: 12px; color: #666;">Export a PDF with tank numbers (3x7 grid per page).</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="number" id="pdf-start" value="1" placeholder="Start #">
                <input type="number" id="pdf-end" value="21" placeholder="End #">
            </div>
            <button onclick="generatePDFLabels()" style="background: #34495e;">Download PDF Labels</button>
        </div>
    </div>

    <script>
        const db = new Dexie("FishBreedingDB");
        db.version(5).stores({ 
            breeds: '++id, name, price', 
            scans: 'barcodeId, breed, unit, bornDate' 
        });

        async function init() {
            await renderSpeciesList();
            await updateBreedDropdown();
            await loadData();
        }
        window.onload = init;

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            document.getElementById('btn-' + tabName).classList.add('active-tab');
            if(tabName === 'breeds') renderSpeciesList();
            if(tabName === 'data') loadData();
        }

        // --- TANK ACCESS ---
        function handleManualEntry() {
            const id = document.getElementById('manual-tank-id').value;
            if(id) openEdit(id);
        }

        async function openEdit(id) {
            showTab('scan');
            document.getElementById('form-title').innerText = "Tank: #" + id;
            document.getElementById('capture-form').classList.remove('hidden');
            const data = await db.scans.get(id);
            
            // Default to blank if no record exists
            document.getElementById('breed-dropdown').value = data ? data.breed : "";
            document.getElementById('born-date-input').value = data ? data.bornDate : "";
            document.getElementById('unit-input').value = data ? data.unit : "";
            window.currentTankId = id;
        }

        async function saveScan() {
            if(!document.getElementById('breed-dropdown').value) return alert("Please select a species.");
            await db.scans.put({
                barcodeId: window.currentTankId,
                breed: document.getElementById('breed-dropdown').value,
                bornDate: document.getElementById('born-date-input').value,
                unit: document.getElementById('unit-input').value
            });
            alert("Record Saved");
            resetUI();
            loadData();
        }
        function resetUI() { document.getElementById('capture-form').classList.add('hidden'); }

        // --- SPECIES LOGIC ---
        async function addBreed() {
            const name = document.getElementById('new-breed-name').value.trim();
            const price = parseFloat(document.getElementById('new-breed-price').value) || 0;
            if(!name) return;
            await db.breeds.add({ name, price });
            document.getElementById('new-breed-name').value = '';
            document.getElementById('new-breed-price').value = '';
            await updateBreedDropdown();
            renderSpeciesList();
        }

        async function renderSpeciesList() {
            const term = document.getElementById('breed-search').value.toLowerCase();
            const list = await db.breeds.toArray();
            const container = document.getElementById('breed-list-container');
            container.innerHTML = list.filter(b => b.name.toLowerCase().includes(term)).map(b => `
                <div class="breed-item" id="row-${b.id}">
                    <div><strong>${b.name}</strong> - $${b.price}</div>
                    <div>
                        <button class="edit-btn" onclick="editBreedInline(${b.id}, '${b.name}', ${b.price})">✏️</button>
                        <button class="danger" onclick="deleteBreed(${b.id})">Del</button>
                    </div>
                </div>
            `).join('');
        }

        function editBreedInline(id, name, price) {
            const row = document.getElementById(`row-${id}`);
            row.innerHTML = `
                <div style="display:flex; gap:5px; width:100%;">
                    <input type="text" id="edit-n-${id}" value="${name}" style="padding:5px;">
                    <input type="number" id="edit-p-${id}" value="${price}" style="padding:5px; width:60px;">
                    <button class="save-btn" onclick="saveBreedEdit(${id})">OK</button>
                </div>
            `;
        }

        async function saveBreedEdit(id) {
            const n = document.getElementById(`edit-n-${id}`).value;
            const p = parseFloat(document.getElementById(`edit-p-${id}`).value) || 0;
            await db.breeds.update(id, { name: n, price: p });
            await updateBreedDropdown();
            renderSpeciesList();
        }

        async function updateBreedDropdown() {
            const list = await db.breeds.toArray();
            const dropdown = document.getElementById('breed-dropdown');
            dropdown.innerHTML = '<option value="">-- Choose Species --</option>' + 
                list.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
        }

        async function deleteBreed(id) { if(confirm("Delete species?")) { await db.breeds.delete(id); renderSpeciesList(); updateBreedDropdown(); } }

        // --- INVENTORY LOGIC ---
        function calculateDays(dateStr) {
            if(!dateStr) return 0;
            const diff = new Date() - new Date(dateStr);
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }

        async function loadData() {
            const filter = document.getElementById('age-filter').value;
            const scans = await db.scans.toArray();
            let totalFish = 0;
            const filtered = scans.filter(s => {
                const days = calculateDays(s.bornDate);
                if(filter === 'fry') return days <= 30;
                if(filter === 'juv') return days > 30 && days <= 60;
                if(filter === 'adult') return days > 60 && days <= 90;
                return true;
            });

            document.getElementById('data-body').innerHTML = filtered.map(s => {
                const days = calculateDays(s.bornDate);
                totalFish += parseInt(s.unit || 0);
                let badge = days <= 30 ? 'bg-fry' : (days <= 60 ? 'bg-juv' : 'bg-adult');
                return `<tr><td>#${s.barcodeId}</td><td>${s.unit || 0} ${s.breed}</td>
                    <td><span class="age-badge ${badge}">${days}d</span></td>
                    <td><button class="edit-btn" onclick="openEdit('${s.barcodeId}')">✏️</button></td></tr>`;
            }).join('');
            document.getElementById('total-fish-count').innerText = totalFish;
        }

        // --- EXPORT/IMPORT ---
        async function exportData() {
            const breeds = await db.breeds.toArray();
            const scans = await db.scans.toArray();
            const blob = new Blob([JSON.stringify({ breeds, scans })], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `Aquarium_Backup.json`;
            a.click();
        }

        async function importData(e) {
            const reader = new FileReader();
            reader.onload = async (event) => {
                const data = JSON.parse(event.target.result);
                if(confirm("Overwriting current data. Continue?")) {
                    await db.breeds.clear(); await db.scans.clear();
                    if(data.breeds) await db.breeds.bulkAdd(data.breeds);
                    if(data.scans) await db.scans.bulkAdd(data.scans);
                    init();
                }
            };
            reader.readAsText(e.target.files[0]);
        }

        // --- PDF LABELS (3x7 Ratio) ---
        function generatePDFLabels() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const start = parseInt(document.getElementById('pdf-start').value);
            const end = parseInt(document.getElementById('pdf-end').value);

            const cols = 3;
            const rows = 7;
            const cellWidth = 60;
            const cellHeight = 35;
            let currentNum = start;

            while (currentNum <= end) {
                for (let r = 0; r < rows && currentNum <= end; r++) {
                    for (let c = 0; c < cols && currentNum <= end; c++) {
                        const x = 10 + (c * cellWidth);
                        const y = 20 + (r * cellHeight);
                        
                        // Draw box
                        doc.setDrawColor(200);
                        doc.rect(x, y, cellWidth - 5, cellHeight - 5);
                        
                        // Draw number
                        doc.setTextColor(0);
                        doc.setFontSize(24);
                        doc.text(`TANK`, x + 12, y + 15);
                        doc.setFontSize(36);
                        doc.text(`#${currentNum}`, x + 12, y + 28);
                        
                        currentNum++;
                    }
                }
                if (currentNum <= end) doc.addPage();
            }
            doc.save("Tank_Labels_Print.pdf");
        }
    </script>
</body>
</html>
