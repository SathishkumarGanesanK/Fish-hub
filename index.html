<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquarium Breeding Hub Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.8/dist/dexie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { font-family: -apple-system, system-ui, sans-serif; margin: 15px; background: #eef2f3; color: #333; padding-bottom: 60px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border-top: 4px solid #00a8cc; }
        
        /* Stats & Navigation */
        .nav { display: flex; gap: 5px; position: sticky; top: 0; background: #eef2f3; z-index: 100; padding: 5px 0; }
        .nav button { flex: 1; font-size: 10px; padding: 12px 2px; background: #fff; border: 1px solid #dee2e6; border-radius: 8px; cursor: pointer; }
        .nav button.active-tab { background: #00a8cc; color: #fff; border-color: #00a8cc; }
        
        .summary-banner { background: #00a8cc; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .summary-banner h2 { margin: 0; font-size: 24px; }
        .summary-banner p { margin: 5px 0 0; font-size: 12px; opacity: 0.9; text-transform: uppercase; }

        /* Forms & Inputs */
        input, select { padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 10px; font-size: 15px; background: #f8f9fa; }
        button { padding: 12px; border: none; border-radius: 10px; background: #00a8cc; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        button.danger { background: #ff4d4d; width: auto; padding: 6px 10px; font-size: 12px; }
        button.edit-btn { background: #ffc107; color: #212529; width: auto; padding: 6px 10px; font-size: 12px; }
        
        /* List Styles */
        .breed-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .age-badge { padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; color: white; display: inline-block; margin-top: 5px; }
        .bg-fry { background: #3498db; }
        .bg-juv { background: #f39c12; }
        .bg-adult { background: #27ae60; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { text-align: left; padding: 10px 5px; border-bottom: 1px solid #eee; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="nav">
        <button id="btn-scan" class="active-tab" onclick="showTab('scan')">TANK ACCESS</button>
        <button id="btn-data" onclick="showTab('data')">INVENTORY</button>
        <button id="btn-breeds" onclick="showTab('breeds')">SPECIES</button>
    </div>

    <div id="tab-scan" class="tab-content">
        <div class="card">
            <input type="number" id="manual-tank-id" placeholder="Enter Tank #">
            <button onclick="handleManualEntry()">Open Tank Record</button>
        </div>
        <div id="capture-form" class="card hidden">
            <h3 id="form-title">Tank: #</h3>
            <label>Species</label>
            <select id="breed-dropdown"></select>
            <label>Hatch Date</label>
            <input type="date" id="born-date-input">
            <label>Number of Fish</label>
            <input type="number" id="unit-input">
            <button onclick="saveScan()" style="background:#28a745;">Save Changes</button>
        </div>
    </div>

    <div id="tab-data" class="tab-content hidden">
        <div class="summary-banner">
            <p id="category-label">Total Fish (All)</p>
            <h2 id="total-fish-count">0</h2>
        </div>
        <div class="card">
            <label>Filter by Life Stage</label>
            <select id="age-filter" onchange="loadData()">
                <option value="all">Show All</option>
                <option value="fry">Fry (0-30 Days)</option>
                <option value="juv">Juvenile (30-60 Days)</option>
                <option value="adult">Adult (60-90 Days)</option>
            </select>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Tank</th><th>Species/Count</th><th>Age (Days)</th><th>Action</th></tr></thead>
                    <tbody id="data-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="tab-breeds" class="tab-content hidden">
        <div class="card">
            <h3>Add New Species</h3>
            <input type="text" id="new-breed-name" placeholder="Name">
            <input type="number" id="new-breed-price" placeholder="Price ($)">
            <button onclick="addBreed()">Add to List</button>
        </div>
        <div class="card">
            <input type="text" id="breed-search" placeholder="Search species..." onkeyup="renderSpeciesList()">
            <div id="breed-list-container"></div>
        </div>
    </div>

    <script>
        const db = new Dexie("FishBreedingDB");
        db.version(5).stores({ 
            breeds: '++id, name, price', 
            scans: 'barcodeId, breed, unit, bornDate' 
        });

        // Initialize App
        async function init() {
            await renderSpeciesList();
            await updateBreedDropdown();
            await loadData();
        }
        window.onload = init;

        // --- NAVIGATION ---
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            document.getElementById('btn-' + tabName).classList.add('active-tab');
            if(tabName === 'breeds') renderSpeciesList();
            if(tabName === 'data') loadData();
        }

        // --- SPECIES MANAGEMENT ---
        async function addBreed() {
            const name = document.getElementById('new-breed-name').value;
            const price = parseFloat(document.getElementById('new-breed-price').value) || 0;
            if(!name) return;
            await db.breeds.add({ name, price });
            document.getElementById('new-breed-name').value = '';
            document.getElementById('new-breed-price').value = '';
            await updateBreedDropdown();
            renderSpeciesList();
        }

        async function renderSpeciesList() {
            const term = document.getElementById('breed-search').value.toLowerCase();
            const list = await db.breeds.toArray();
            const container = document.getElementById('breed-list-container');
            container.innerHTML = list.filter(b => b.name.toLowerCase().includes(term)).map(b => `
                <div class="breed-item">
                    <div><strong>${b.name}</strong> - $${b.price}</div>
                    <button class="danger" onclick="deleteBreed(${b.id})">Del</button>
                </div>
            `).join('');
        }

        async function deleteBreed(id) {
            await db.breeds.delete(id);
            renderSpeciesList();
            updateBreedDropdown();
        }

        async function updateBreedDropdown() {
            const list = await db.breeds.toArray();
            document.getElementById('breed-dropdown').innerHTML = 
                list.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
        }

        // --- INVENTORY LOGIC ---
        function calculateDays(dateStr) {
            if(!dateStr) return 0;
            const diff = new Date() - new Date(dateStr);
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }

        async function loadData() {
            const filter = document.getElementById('age-filter').value;
            const scans = await db.scans.toArray();
            const container = document.getElementById('data-body');
            let totalFish = 0;
            
            const filteredData = scans.filter(s => {
                const days = calculateDays(s.bornDate);
                if(filter === 'fry') return days <= 30;
                if(filter === 'juv') return days > 30 && days <= 60;
                if(filter === 'adult') return days > 60 && days <= 90;
                return true;
            });

            container.innerHTML = filteredData.map(s => {
                const days = calculateDays(s.bornDate);
                totalFish += parseInt(s.unit || 0);
                let badgeClass = days <= 30 ? 'bg-fry' : (days <= 60 ? 'bg-juv' : 'bg-adult');
                let stageName = days <= 30 ? 'FRY' : (days <= 60 ? 'JUV' : 'ADULT');

                return `<tr>
                    <td>#${s.barcodeId}</td>
                    <td><strong>${s.unit || 0}</strong> ${s.breed}</td>
                    <td><span class="age-badge ${badgeClass}">${days} Days (${stageName})</span></td>
                    <td><button class="edit-btn" onclick="openEdit('${s.barcodeId}')">✏️</button></td>
                </tr>`;
            }).join('');

            document.getElementById('total-fish-count').innerText = totalFish;
            document.getElementById('category-label').innerText = `Total Fish (${filter.toUpperCase()})`;
        }

        // --- TANK ACCESS ---
        function handleManualEntry() {
            const id = document.getElementById('manual-tank-id').value;
            if(id) openEdit(id);
        }

        async function openEdit(id) {
            showTab('scan');
            document.getElementById('form-title').innerText = "Tank: #" + id;
            document.getElementById('capture-form').classList.remove('hidden');
            const data = await db.scans.get(id);
            if(data) {
                document.getElementById('breed-dropdown').value = data.breed;
                document.getElementById('born-date-input').value = data.bornDate;
                document.getElementById('unit-input').value = data.unit;
            } else {
                document.getElementById('born-date-input').value = "";
                document.getElementById('unit-input').value = "";
            }
            window.currentTankId = id;
        }

        async function saveScan() {
            await db.scans.put({
                barcodeId: window.currentTankId,
                breed: document.getElementById('breed-dropdown').value,
                bornDate: document.getElementById('born-date-input').value,
                unit: document.getElementById('unit-input').value
            });
            alert("Saved!");
            loadData();
        }
    </script>
</body>
</html>
